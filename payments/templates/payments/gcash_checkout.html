<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCash Payment - LabHatud Laundry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0D4F3C 0%, #00695C 50%, #00C2A8 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 28px;
            text-decoration: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.3s;
            z-index: 10;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .payment-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }
        
        .payment-form {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .form-content {
            padding: 30px 25px 25px;
        }
        
        .gcash-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #007DFF, #0066CC);
            border-radius: 16px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            font-weight: bold;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 600;
        }
        
        .messages {
            background: #ffebee;
            color: #c62828;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            color: #666;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00C2A8;
        }
        
        .input-hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #00C2A8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            background: #00a896;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 194, 168, 0.3);
        }
        
        .note {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <a href="/student-home/" class="close-btn">✕</a>
    
    <div class="payment-container">
        <div class="payment-form">
            <div class="form-content">
                <div class="gcash-logo">₱</div>
                <h2>Enter Payment Details</h2>
                
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            {{ message }}
                        {% endfor %}
                    </div>
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label>Description:</label>
                        <input type="text" name="description" value="{{ description }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Amount (PHP):</label>
                        <input type="number" name="amount" value="{{ amount }}" step="0.01" min="100" required>
                        <div class="input-hint">Minimum: ₱100.00</div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Pay with GCash</button>
                </form>
                
                <div class="note">
                    You will be redirected to complete your payment securely.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
