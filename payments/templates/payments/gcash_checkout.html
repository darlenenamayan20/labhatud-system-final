<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCash Payment - LabHatud Laundry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            padding: 20px 0;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            text-decoration: none;
            cursor: pointer;
        }
        .payment-form {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
            position: relative;
        }
        .payment-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(135deg, transparent 10px, white 0) 0 0,
                        linear-gradient(225deg, transparent 10px, white 0) 0 0;
            background-size: 20px 20px;
            background-repeat: repeat-x;
        }
        .form-content {
            padding: 40px 30px 30px;
        }
        .gcash-logo {
            width: 80px;
            height: 80px;
            background: #007DFF;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .messages {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #007DFF;
        }
        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #00a859;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background: #008f4c;
        }
        .note {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <a href="/" class="close-btn">✕</a>
    
    <div class="header">
        <h1>Pay with GCash</h1>
    </div>

    <div class="payment-form">
        <div class="form-content">
            <div class="gcash-logo">₱</div>
            <h2>Enter Payment Details</h2>
            
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Description:</label>
                    <input type="text" name="description" value="{{ description }}" required>
                </div>
                
                <div class="form-group">
                    <label>Amount (PHP):</label>
                    <input type="number" name="amount" value="{{ amount }}" step="0.01" min="100" required>
                    <div class="input-hint">Minimum: ₱100.00</div>
                </div>
                
                <button type="submit" class="submit-btn">Pay with GCash</button>
            </form>
            
            <div class="note">
                You will be redirected to complete your payment securely.
            </div>
        </div>
    </div>
</body>
</html>
