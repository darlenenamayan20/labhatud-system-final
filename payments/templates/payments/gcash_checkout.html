<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCash Payment - LabHatud Laundry</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .gcash-logo {
            background: #0077be;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background: #00a859;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #008f4c;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .messages {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gcash-logo">₱</div>
        <h2>Pay with GCash</h2>
        
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <label>Description:</label>
            <input type="text" name="description" value="{{ description }}" required>
            
            <label>Amount (PHP):</label>
            <input type="number" name="amount" value="{{ amount }}" step="0.01" min="100" required>
            <small>Minimum: ₱100.00</small>
            
            <button type="submit">Pay with GCash</button>
        </form>
        
        <div class="note">
            You will be redirected to PayMongo to complete your GCash payment.
        </div>
    </div>
</body>
</html>
